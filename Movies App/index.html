    <style>
        * {
            padding: 0;

        .main {
            display: none;
            background: #e0e5ec;

        .row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .box {
            padding: 10px;
            width: 25%;
            flex-basis: 25%;
            height: 400px;
            border-radius: 5px;
            overflow: hidden;
            border-radius: 5px;
            position: relative;
        }

        .box img {
            width: 100%;
            height: 100%;
            box-shadow: 0 4px 5px rgb(0 0 0 / 20%);
            background: #e0e5ec;
            border-radius: 10px;
            box-shadow: 5px 5px 10px #b1b1b1, -5px -5px 10px #ffffff;
        }

        .box .overlay {
            width: 100%;
            max-height: 100%;
            min-height: auto;
            position: absolute;
            bottom: -100%;
            font-weight: bold;
            padding: 20px;
            border-radius: 10px 10px 0px 0px;
            left: 0;
            transition: 0.5s;
            background-color: white;
        }

        .box span {
            color: orange;
            display: inline-block;
            font-weight: bold;
            font-size: 25px;
        }

    <!--SCROLL TOP-->
    <script>
        // Scroll to the top of the page
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Show scroll-up button when user scrolls down
        window.onscroll = function () {
            let scrollBtn = document.querySelector('.scroll-up-btn');
            if (document.body.scrollTop > 50 || document.documentElement.scrollTop > 50) {
                scrollBtn.style.display = "block";
            } else {
                scrollBtn.style.display = "none";
            }
        };
    </script>
    <!-- App JS -->
    <script>
        const APIURL = "https://api.themoviedb.org/3/discover/movie?sort_by=popularity.desc&api_key=04c35731a5ee918f014970082a0088b1&page=1";
        const IMGPATH = "https://image.tmdb.org/t/p/w1280";
        const SEARCHAPI = "https://api.themoviedb.org/3/search/movie?&api_key=04c35731a5ee918f014970082a0088b1&query=";
        const movieBox = document.querySelector("#movie-box");
        const loading = document.querySelector("#loading");
        const mainContent = document.querySelector(".main");

        // Loading Duration (in milliseconds) - Fixed loading time
        const LOADING_DURATION = 3000; // 3 seconds

        const getMovies = async (url) => {
            loading.style.display = 'block';  // Show loading skeleton
            mainContent.style.display = 'none'; // Hide main content during loading

            const response = await fetch(url);
            const data = await response.json();
            showMovies(data);
        }

        const showMovies = (data) => {
    movieBox.innerHTML = "";
    
    if (data.results.length === 0) {
        const noResultsMessage = document.createElement("div");
        noResultsMessage.classList.add("no-results");
        noResultsMessage.innerHTML = `
            <div style="display: flex;
            align-items: center;
            justify-content: center;color:red;flex-direction:column;">
            <img src="https://cdnl.iconscout.com/lottie/premium/thumb/data-error-8597339-6842609.gif" style="height:360px;width:360px;'>
            <h2 style="text-align:center;marging-bottom:10px;">No movies found.Try another search!</h2> </div>
           
           
        `;
        movieBox.appendChild(noResultsMessage);
    } else {
        data.results.forEach((result) => {
            const imagePath = result.poster_path === null ? "img/image-missing.png" : IMGPATH + result.poster_path;
            const box = document.createElement("div");
            box.classList.add("box");
            box.innerHTML = `
                <img src="${imagePath}" alt="" />
                <div class="overlay">
                    <div class="title"> 
                        <h2> ${result.original_title}  </h2>
                        <span> ${result.vote_average} </span>
                    </div>
                    <h3>Overview :</h3>
                    <p> 
                        ${result.overview}
                    </p>
                </div>
            `;
            movieBox.appendChild(box);
        });
    }

    // Hide the loading skeleton and show content after fixed duration
    setTimeout(() => {
        loading.style.display = 'none';  // Hide loading skeleton
        mainContent.style.display = 'block';  // Show main content
    }, LOADING_DURATION); // Fixed delay of 3 seconds
}


        // Search Event Listener (Search Button)
        document.querySelector("#search-btn").addEventListener("click", function () {
            const searchValue = document.querySelector("#search").value.trim();
            if (searchValue === "") {
                // Show popup if search is empty
                document.getElementById("popup").classList.remove("hidden");
            } else {
                getMovies(SEARCHAPI + searchValue);
            }
        });

        // Search Event Listener (Enter Key)
        document.querySelector("#search").addEventListener("keyup", function (event) {
            if (event.key === "Enter") {
                const searchValue = event.target.value.trim();
                if (searchValue === "") {
                    // Show popup if search is empty
                    document.getElementById("popup").classList.remove("hidden");
                } else {
                    getMovies(SEARCHAPI + searchValue);
                }
            }
        });

        // Close the popup
        function closePopup() {
            document.getElementById("popup").classList.add("hidden");
        }

        // Initially load movies
        getMovies(APIURL);
    </script>

    <!--FULLSCREEN-->
<script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:application/javascript,const sw%3Dself%3Bsw.addEventListener(%22install%22,()%3D>sw.skipWaiting()),sw.addEventListener(%22fetch%22,()=>{});');
    }



    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log(`Fullscreen error: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    }



  </script>
